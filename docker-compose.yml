services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: resume-shapeshifter:latest
    container_name: resume-shapeshifter-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - PDF_FORCE_MOCK=${PDF_FORCE_MOCK:-false}
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    container_name: resume-shapeshifter-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: resume_shapeshifter
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
